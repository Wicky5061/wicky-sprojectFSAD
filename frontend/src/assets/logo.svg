  <ellipse cx="34" cy="38" rx="7" ry="16" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <line x1="18" y1="38" x2="50" y2="38" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <path d="M 19 30 Q 34 27 49 30" fill="none" stroke="white" stroke-width="1.1" opacity="0.5"/>
  <path d="M 19 46 Q 34 49 49 46" fill="none" stroke="white" stroke-width="1.1" opacity="0.5"/>
